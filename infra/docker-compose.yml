services:
  postgres:
    image: postgres:15-alpine
    container_name: lucubrum-postgres
    environment:
      POSTGRES_USER: lucubrum
      POSTGRES_PASSWORD: lucubrum_dev
      POSTGRES_DB: lucubrum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucubrum"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lucubrum-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-node:
    build:
      context: ..
      dockerfile: apps/api-node/Dockerfile
    container_name: lucubrum-api
    environment:
      NODE_ENV: development
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://lucubrum:lucubrum_dev@postgres:5432/lucubrum
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PYTHON_SERVICE_URL: http://curriculum-python:8000
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5173/oauth/callback}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      QUALITY_SIGNALS_ENABLED: ${QUALITY_SIGNALS_ENABLED:-true}
      QUALITY_SIGNALS_SCHEDULE: ${QUALITY_SIGNALS_SCHEDULE:-0 2 * * *}
      QUALITY_SIGNALS_MIN_SAMPLE_SIZE: ${QUALITY_SIGNALS_MIN_SAMPLE_SIZE:-20}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ../apps/api-node/src:/app/src
      - ../packages:/app/packages
    profiles:
      - full

  curriculum-python:
    build:
      context: ../apps/curriculum-python
      dockerfile: Dockerfile
    container_name: lucubrum-curriculum
    environment:
      ENVIRONMENT: development
      PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      DATABASE_URL: postgresql://lucubrum:lucubrum_dev@postgres:5432/lucubrum
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/curriculum-python/src:/app/src
    profiles:
      - full

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_APP_URL: http://localhost:5173
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: lucubrum-web
    ports:
      - "5173:80"
    depends_on:
      api-node:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
