# Render Blueprint for Lucubrum.
# This blueprint owns backend infrastructure only:
# - lucubrum-api
# - lucubrum-curriculum
# - lucubrum-redis
# - lucubrum-postgres
#
# Deploy apps/web separately on Vercel.
# Configure the API custom domain in Render after the first sync:
# - api.<domain> for lucubrum-api

services:
  - type: keyvalue
    name: lucubrum-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: pserv
    name: lucubrum-curriculum
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/curriculum-python/Dockerfile
    dockerContext: ./apps/curriculum-python
    envVars:
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lucubrum-postgres
          property: connectionString
      - key: SERVICE_TOKEN
        generateValue: true
      - key: LLM_PROVIDER
        value: zai
      - key: LLM_MODEL
        value: glm-5.1
      - key: ZAI_API_KEY
        sync: false
      - key: ZAI_BASE_URL
        value: https://api.z.ai/api/paas/v4/
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CONTEXT7_API_KEY
        sync: false
      - key: CONTEXT7_ENABLED
        value: "true"
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: WEB_SEARCH_ENABLED
        value: "true"
      - key: LLM_MAX_RETRIES
        value: "2"
      - key: STALENESS_POLICIES_CACHE_TTL
        value: "300"

  - type: web
    name: lucubrum-api
    runtime: docker
    plan: starter
    dockerfilePath: ./apps/api-node/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    preDeployCommand: ./infra/scripts/db-migrate.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCHEMAS_DIR
        value: /app/packages/contracts/schemas
      - key: DATABASE_URL
        fromDatabase:
          name: lucubrum-postgres
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: lucubrum-postgres
          property: host
      - key: POSTGRES_DB
        fromDatabase:
          name: lucubrum-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: lucubrum-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: lucubrum-postgres
          property: password
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lucubrum-redis
          property: connectionString
      - key: PYTHON_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: lucubrum-curriculum
          property: hostport
      - key: SERVICE_TOKEN
        fromService:
          type: pserv
          name: lucubrum-curriculum
          envVarKey: SERVICE_TOKEN
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: ""
      - key: CORS_ORIGIN
        sync: false
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FACEBOOK_APP_ID
        value: ""
      - key: FACEBOOK_APP_SECRET
        value: ""
      - key: FACEBOOK_REDIRECT_URI
        value: ""
      - key: YOUTUBE_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: LLM_TIMEOUT_SECONDS
        value: "100"
      - key: EXERCISE_MASTERY_CAP
        value: "0.35"
      - key: MASTERY_VOLUME_TARGET
        value: "15"
      - key: YOUTUBE_CACHE_TTL_SECONDS
        value: "604800"
      - key: LEARN_CACHE_TTL_SECONDS
        value: "86400"
      - key: LEARN_PRELOAD_CONCURRENCY
        value: "2"
      - key: VIDEO_VALIDATION_ENABLED
        value: "true"
      - key: VIDEO_MIN_RELEVANCE_SCORE
        value: "0.6"
      - key: VIDEO_VALIDATION_CONCURRENCY
        value: "5"
      - key: TIER_PRO_ROLE
        value: pro
      - key: TIER_SUPER_ROLE
        value: super
      - key: FREE_MAX_ACTIVE_PLANS
        value: "3"
      - key: FREE_ALLOWED_PLAN_SIZES
        value: basic,moderate
      - key: FREE_DAILY_LLM_ATTEMPTS
        value: "15"
      - key: FREE_MAX_EXAMS_PER_NODE
        value: "2"
      - key: FREE_EXERCISE_REGENERATIONS
        value: "0"
      - key: FREE_PLAN_HISTORY_DAYS
        value: "30"
      - key: QUALITY_SIGNALS_ENABLED
        value: "true"
      - key: QUALITY_SIGNALS_SCHEDULE
        value: "0 2 * * *"
      - key: QUALITY_SIGNALS_MIN_SAMPLE_SIZE
        value: "20"

databases:
  - name: lucubrum-postgres
    databaseName: lucubrum
    user: lucubrum
    plan: basic-256mb
    postgresMajorVersion: "15"
    ipAllowList: []
